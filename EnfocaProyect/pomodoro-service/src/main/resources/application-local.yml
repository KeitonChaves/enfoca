# Perfil local — sobreescribe valores del application.yml para desarrollo
# /resources/application-local.yml
spring:
  jpa:
    show-sql: true
  flyway:
    out-of-order: true
    locations: classpath:db/migration,classpath:db/seeds

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:8082
    status-page-url: http://localhost:8082/actuator/info
    health-check-url: http://localhost:8082/actuator/health
    home-page-url: http://localhost:8082/

logging:
  level:
    cl.enfoca: DEBUG
    org.springframework.web: DEBUG
