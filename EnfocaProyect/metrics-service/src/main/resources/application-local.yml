spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5437/enfoca_metrics}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  flyway:
    enabled: true
    out-of-order: true
    locations: classpath:db/migration,classpath:db/seeds

app:
  jwt:
    secret: dGhpcy1pcy1hLXZlcnktc2VjdXJlLXNlY3JldC1rZXktZm9yLWRldmVsb3BtZW50LW9ubHk=
  pomodoro-service:
    url: ${POMODORO_SERVICE_URL:http://localhost:8082}
  groq:
    api-key: ${GROQ_API_KEY:dummy-key-local}
    url: https://api.groq.com/openai/v1/chat/completions
    modelo: llama-3.3-70b-versatile

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: false
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:8083
    status-page-url: http://localhost:8083/actuator/info
    health-check-url: http://localhost:8083/actuator/health
    home-page-url: http://localhost:8083/

logging:
  level:
    online.enfoca.metricsservice: DEBUG
