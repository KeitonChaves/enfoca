spring:
  application:
    name: metrics-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: metrics
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: metrics
    default-schema: metrics
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8083}

app:
  jwt:
    secret: ${JWT_SECRET}

  pomodoro-service:
    url: ${POMODORO_SERVICE_URL:http://localhost:8084}

  metrics:
    streak-timezone: ${METRICS_TIMEZONE:America/Santiago}

  groq:
    api-key: ${GROQ_API_KEY}
    url: ${GROQ_URL:https://api.groq.com/openai/v1/chat/completions}
    modelo: ${GROQ_MODELO:llama-3.3-70b-versatile}

logging:
  level:
    root: WARN
    online.enfoca: INFO