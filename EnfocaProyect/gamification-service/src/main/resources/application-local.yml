spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://127.0.0.1:5436/enfoca_gamification
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true
    out-of-order: true

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:8088
    status-page-url: http://localhost:8088/actuator/info
    health-check-url: http://localhost:8088/actuator/health
    home-page-url: http://localhost:8088/

logging:
  level:
    online.enfoca.gamificationservice: DEBUG
