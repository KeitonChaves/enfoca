spring:
  application:
    name: certification-service
  profiles:
    active: local

  datasource:
    url: ${CERT_DB_URL:jdbc:postgresql://127.0.0.1:5438/enfoca_certification}
    username: ${CERT_DB_USERNAME:postgres}
    password: ${CERT_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: certificacion
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    schemas: certificacion
    default-schema: certificacion
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8086

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: false
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:8086

app:
  groq:
    api-key: ${GROQ_API_KEY}
    url: ${GROQ_URL:https://api.groq.com/openai/v1/chat/completions}
    modelo: ${GROQ_MODELO:llama-3.3-70b-versatile}

logging:
  level:
    online.enfoca.certificationservice: INFO
