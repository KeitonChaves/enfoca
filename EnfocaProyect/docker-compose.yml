services:

  # ================================================================
  # BASES DE DATOS
  # ================================================================

  auth-db:
    image: postgres:15
    container_name: auth-db
    environment:
      POSTGRES_DB: enfoca_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Kaoz1699
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
      - ./auth-service/src/main/resources/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  pomodoro-db:
    image: postgres:15
    container_name: pomodoro-db
    environment:
      POSTGRES_DB: enfoca
      POSTGRES_USER: enfoca
      POSTGRES_PASSWORD: enfoca
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pomodoro-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enfoca"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  ai-db:
    image: postgres:15
    container_name: ai-db
    environment:
      POSTGRES_DB: enfoca_planes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5435:5432"
    volumes:
      - ai-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  gamification-db:
    image: postgres:15
    container_name: gamification-db
    environment:
      POSTGRES_DB: enfoca_gamification
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5436:5432"
    volumes:
      - gamification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  metrics-db:
    image: postgres:15
    container_name: metrics-db
    environment:
      POSTGRES_DB: enfoca_metrics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5437:5432"
    volumes:
      - metrics-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  # ================================================================
  # MENSAJERÍA Y CACHÉ
  # ================================================================

  rabbitmq:
    image: rabbitmq:3-management
    container_name: pomodoro-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: pomodoro-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ================================================================
  # DESCUBRIMIENTO (debe arrancar primero)
  # ================================================================

  discovery-service:
    build:
      context: .
      dockerfile: discovery-service/Dockerfile
    container_name: discovery-service
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: local
      EUREKA_INSTANCE_HOSTNAME: discovery-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  # ================================================================
  # MICROSERVICIOS
  # ================================================================

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      auth-db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/enfoca_auth
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: auth-service
      EUREKA_INSTANCE_INSTANCEID: auth-service:8081
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: ai-service
    ports:
      - "8085:8085"
    depends_on:
      ai-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      AI_DB_URL: jdbc:postgresql://ai-db:5432/enfoca_planes
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      EUREKA_URL: http://discovery-service:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: ai-service
      EUREKA_INSTANCE_INSTANCEID: ai-service:8085
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    restart: unless-stopped

  pomodoro-service:
    build:
      context: .
      dockerfile: pomodoro-service/Dockerfile
    container_name: pomodoro-service
    ports:
      - "8082:8082"
    depends_on:
      pomodoro-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://pomodoro-db:5432/enfoca
      SPRING_DATASOURCE_USERNAME: enfoca
      SPRING_DATASOURCE_PASSWORD: enfoca
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      EUREKA_URL: http://discovery-service:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: pomodoro-service
      EUREKA_INSTANCE_INSTANCEID: pomodoro-service:8082
    restart: unless-stopped

  gamification-service:
    build:
      context: .
      dockerfile: gamification-service/Dockerfile
    container_name: gamification-service
    ports:
      - "8088:8088"
    depends_on:
      gamification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://gamification-db:5432/enfoca_gamification
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: gamification-service
      EUREKA_INSTANCE_INSTANCEID: gamification-service:8088
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    restart: unless-stopped

  metrics-service:
    build:
      context: .
      dockerfile: metrics-service/Dockerfile
    container_name: metrics-service
    ports:
      - "8083:8083"
    depends_on:
      metrics-db:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://metrics-db:5432/enfoca_metrics
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET_KEY}
      POMODORO_SERVICE_URL: http://pomodoro-service:8082
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: local
      REDIS_HOST: redis
      REDIS_PASSWORD: ""
      EUREKA_URL: http://discovery-service:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      EUREKA_INSTANCE_INSTANCEID: api-gateway:8080
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    restart: unless-stopped

# ================================================================
# VOLÚMENES PERSISTENTES
# ================================================================
volumes:
  auth-db-data:
  pomodoro-db-data:
  ai-db-data:
  gamification-db-data:
  metrics-db-data:
